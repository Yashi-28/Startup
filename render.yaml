services:
  # 1. Python FastAPI Backend Web Service
  - type: web
    name: startsmart-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/train_models.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./database.db
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Render dashboard will prompt you to type this key
      - key: FRONTEND_URL
        sync: false # Render dashboard will prompt you to type this key

  # 2. React Vite Frontend Static Site
  - type: web
    name: startsmart-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Render dashboard will prompt you to type this key
